name: Deploy documentation

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"
            - uses: actions/configure-pages@v6
            - run: bun install --frozen-lockfile
            - name: Build Starlight for GitHub Pages
              env:
                  WIZ_DOCS_BASE: /docs
                  WIZ_DOCS_SITE: https://wiz-sh.github.io
              run: bun run build
            - uses: actions/upload-pages-artifact@v5
              with:
                  path: apps/docs/dist
            - id: deployment
              uses: actions/deploy-pages@v5
